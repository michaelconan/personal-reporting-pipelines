name: Weekly Documentation Updater

on:
  schedule:
    - cron: '0 8 * * 1'  # monday at 8 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-doc-update-task:
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Write issue body
        run: |
          cat > /tmp/issue-body.md << 'EOF'
          Automated weekly documentation maintenance task. Scan the repository for
          pull requests merged in the past 7 days, identify changes that affect any
          of the documentation targets listed below, and update them. If changes are
          needed, create a pull request titled `[docs] Weekly documentation update â€” YYYY-MM-DD`.
          If everything is already accurate, close this issue without creating a PR.

          ## Documentation Targets

          | File | What it documents |
          |------|-------------------|
          | `AGENTS.md` | AI agent context: architecture, naming conventions, data model, habit keys, macros |
          | `.gemini/GEMINI.md` | Gemini context: tech stack, code standards, scheduling, data patterns |
          | `README.md` | Project overview, data sources, architecture, setup, pipeline patterns |
          | `dbt/README.md` | dbt project overview, model layers, local testing, data quality |
          | `docs/source/index.rst` | Sphinx index: toctree entries, included files |
          | `docs/source/dbt.rst` | Sphinx dbt page: links to generated dbt docs |
          | `dbt/models/**/*__properties.yml` | dbt model and column descriptions |
          | `dbt/models/staging/**/*__sources.yml` | dbt source table definitions |
          | `dbt/macros/_macros__properties.yml` | dbt macro descriptions |
          | `dbt/seeds/_seeds__properties.yml` | dbt seed descriptions |

          ## Steps

          ### 1. Find Merged PRs (Past 7 Days)

          Search for PRs merged in the past 7 days using:
          `repo:${{ github.repository }} is:pr is:merged merged:>=YYYY-MM-DD`

          If no PRs were merged, close this issue with the comment
          "No merged PRs found in the past 7 days. Documentation is up to date."

          ### 2. Analyze Code Changes

          For each merged PR, review the changed files and categorize:
          - **Pipeline changes** (`pipelines/*.py`, `pipelines/hs_config.yml`): new/renamed source tables, columns, or endpoints
          - **dbt model changes** (`dbt/models/**/*.sql`): new/renamed/removed models or columns
          - **dbt property/source changes** (`dbt/models/**/*.yml`): updated source or model definitions
          - **Seed changes** (`dbt/seeds/**/*.csv`): new/renamed seed files or habits
          - **Macro changes** (`dbt/macros/**/*.sql`): new/renamed/removed custom macros
          - **Workflow schedule changes** (`.github/workflows/*.yml`): updated cron schedules
          - **Variable changes** (`dbt/dbt_project.yml`): new or updated dbt variables

          ### 3. Read Current Documentation

          Before making any changes, read all relevant documentation targets.

          ### 4. Update Documentation

          For each target, identify gaps caused by the merged code changes and apply minimal edits:

          **`AGENTS.md`** â€” check: Key Files, API Naming Conventions, Data Model Layers, Habit Keys, dbt Variables, Custom Macros

          **`.gemini/GEMINI.md`** â€” check: Pipeline Scheduling, File Organization

          **`README.md`** â€” check: Data Sources, Architecture, Project Structure, Environment Variables, GitHub Actions Orchestration

          **`dbt/README.md`** â€” check: Layers table, Local Testing, Data Quality

          **Sphinx docs** â€” check toctree entries in `docs/source/index.rst`; update `docs/source/dbt.rst` only if the dbt docs generation process changed

          **dbt properties** â€” for each SQL model touched in a merged PR:
          1. Find the corresponding `_*__properties.yml` in the same directory
          2. Add missing model or column `description` entries
          3. Remove entries for deleted models/columns; update renamed ones
          4. For sources: add/update entries for new or renamed raw tables
          5. For macros/seeds: add/remove entries to match actual files

          Description style: terse and factual, matching existing entries. Boolean habit columns: `"Whether the {habit_name} habit was completed."` Numeric columns: `"The {unit} of {metric}."` Model descriptions: one sentence stating grain and source.

          ### 5. Create Pull Request

          If you made any documentation changes, open a PR:
          - **Title**: `[docs] Weekly documentation update â€” YYYY-MM-DD`
          - **Labels**: `documentation`, `automation`
          - **Body**: list each changed file with the reason

          ## Guidelines

          - **Be accurate**: Only document changes verifiably present in merged code. Do not speculate.
          - **Be minimal**: Make the smallest correct edit. Do not rewrite already-accurate sections.
          - **Be specific**: Preserve exact naming conventions (e.g., `notion__data_source_*` not `notion__database_*`).
          - **Scope**: Only modify the documentation targets listed above. Do not touch source code, SQL, Python, or workflow YAML files.
          - **dbt properties**: Prefer adding missing descriptions over rewriting existing ones. Never change `data_tests` blocks.
          EOF

      - name: Create documentation update issue and assign to Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Weekly documentation update â€” ${{ steps.date.outputs.date }}" \
            --assignee "copilot" \
            --label "documentation,automation" \
            --body-file /tmp/issue-body.md \
            --repo "$GITHUB_REPOSITORY"
