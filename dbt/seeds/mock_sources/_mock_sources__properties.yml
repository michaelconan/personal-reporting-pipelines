version: 2

seeds:
  - name: fitbit__activities
    config:
      column_types:
        log_id: bigint

  - name: fitbit__sleep
    config:
      column_types:
        log_id: bigint

  - name: hubspot__companies
    columns:
      - name: id
        data_type: integer
      - name: properties__name
        data_type: varchar
      - name: properties__createdate
        data_type: timestamp
      - name: properties__hs_lastmodifieddate
        data_type: timestamp
      - name: properties__hs_ideal_customer_profile
        data_type: varchar

  - name: hubspot__contacts
    columns:
      - name: id
        data_type: integer
      - name: properties__associatedcompanyid
        data_type: integer
      - name: properties__email
        data_type: varchar
      - name: properties__firstname
        data_type: varchar
      - name: properties__lastname
        data_type: varchar
      - name: properties__createdate
        data_type: timestamp
      - name: properties__lastmodifieddate
        data_type: timestamp

  - name: notion__data_source_daily_habits
    columns:
      - name: parent__data_source_id
        data_type: varchar
        data_tests:
          - not_null
      - name: id
        data_type: varchar
        data_tests:
          - not_null
      - name: properties__date__date
        data_type: json
        data_tests:
          - not_null
      - name: properties__name__title
        data_type: varchar
        data_tests:
          - not_null
      - name: properties__devotional__checkbox
        data_type: boolean
        data_tests:
          - not_null
      - name: properties__journal__checkbox
        data_type: boolean
        data_tests:
          - not_null
      - name: properties__prayer__checkbox
        data_type: boolean
        data_tests:
          - not_null
      - name: properties__read_bible__checkbox
        data_type: boolean
        data_tests:
          - not_null
      - name: properties__workout__checkbox
        data_type: boolean
        data_tests:
          - not_null
      - name: properties__language__checkbox
        data_type: boolean
        data_tests:
          - not_null
      - name: created_time
        data_type: timestamp
        data_tests:
          - not_null
      - name: last_edited_time
        data_type: timestamp
        data_tests:
          - not_null

  - name: notion__data_source_weekly_habits
    columns:
      - name: parent__data_source_id
        data_type: varchar
        data_tests:
          - not_null
      - name: id
        data_type: varchar
        data_tests:
          - not_null
      - name: properties__date__date
        data_type: json
        data_tests:
          - not_null
      - name: properties__name__title
        data_type: varchar
        data_tests:
          - not_null
      - name: properties__fast__checkbox
        data_type: boolean
        data_tests:
          - not_null
      - name: properties__prayer_minutes__formula
        data_type: json
        data_tests:
          - not_null
      - name: properties__screen_minutes__number
        data_type: numeric
        data_tests:
          - not_null
      - name: properties__church__checkbox
        data_type: boolean
        data_tests:
          - not_null
      - name: properties__community__checkbox
        data_type: boolean
        data_tests:
          - not_null
      - name: created_time
        data_type: timestamp
        data_tests:
          - not_null
      - name: last_edited_time
        data_type: timestamp
        data_tests:
          - not_null

  - name: notion__data_source_monthly_habits
    columns:
