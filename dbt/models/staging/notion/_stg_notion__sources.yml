version: 2

sources:
  - name: notion
    description: "Source data from the Notion habit tracker."
    schema: "{{ env_var('RAW_SCHEMA', 'raw') }}"
    tables:
      - name: data_source_daily_habits
        identifier: notion__data_source_daily_habits
        description: "Raw habit entries from the daily habits data source."
        columns:
          - name: parent__data_source_id
            data_type: varchar
            data_tests:
              - not_null
          - name: id
            data_type: varchar
            data_tests:
              - not_null
          - name: properties__date__date
            data_type: date
            data_tests:
              - not_null
          - name: properties__name__title
            data_type: varchar
            data_tests:
              - not_null
          - name: properties__devotional__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__journal__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__prayer__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__read_bible__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__workout__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__language__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: created_time
            data_type: timestamp
            data_tests:
              - not_null
          - name: last_edited_time
            data_type: timestamp
            data_tests:
              - not_null

      - name: data_source_weekly_habits
        identifier: notion__data_source_weekly_habits
        description: "Raw habit entries from the weekly habits data source."
        columns:
          - name: parent__data_source_id
            data_type: varchar
            data_tests:
              - not_null
          - name: id
            data_type: varchar
            data_tests:
              - not_null
          - name: properties__date__date
            data_type: date
            data_tests:
              - not_null
          - name: properties__name__title
            data_type: varchar
            data_tests:
              - not_null
          - name: properties__fast__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__prayer_minutes__formula
            data_type: varchar
            data_tests:
              - not_null
          - name: properties__screen_minutes__number
            data_type: numeric
            data_tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:
                    min_value: 250
                    max_value: 2000
                    row_condition: "properties__screen_minutes__number is not null"
          - name: properties__church__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__community__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__cook__checkbox
            data_type: boolean
          - name: properties__cardio__checkbox
            data_type: boolean
          - name: properties__sabbath__checkbox
            data_type: boolean
          - name: properties__date_night__checkbox
            data_type: boolean
          - name: created_time
            data_type: timestamp
            data_tests:
              - not_null
          - name: last_edited_time
            data_type: timestamp
            data_tests:
              - not_null

      - name: data_source_habit_reference
        identifier: notion__data_source_habit_reference
        description: "Reference table of all tracked disciplines from the Notion habit reference database."
        columns:
          - name: parent__data_source_id
            data_type: varchar
            data_tests:
              - not_null
          - name: id
            data_type: varchar
            data_tests:
              - not_null
          - name: properties__name__title
            data_type: varchar
            data_tests:
              - not_null
          - name: properties__category__select
            data_type: varchar
          - name: properties__frequency__select
            data_type: varchar
          - name: properties__type__select
            data_type: varchar
          - name: properties__source__select
            data_type: varchar
          - name: properties__target__number
            data_type: numeric
          - name: properties__threshold__number
            data_type: numeric
          - name: properties__below_threshold__checkbox
            data_type: boolean
          - name: properties__active__formula
            data_type: varchar
          - name: properties__start_date__date
            data_type: varchar
          - name: properties__end_date__date
            data_type: varchar

      - name: data_source_monthly_habits
        identifier: notion__data_source_monthly_habits
        description: "Raw habit entries from the monthly habits data source."
        columns:
          - name: parent__data_source_id
            data_type: varchar
            data_tests:
              - not_null
          - name: id
            data_type: varchar
            data_tests:
              - not_null
          - name: properties__date__date
            data_type: date
            data_tests:
              - not_null
          - name: properties__name__title
            data_type: varchar
            data_tests:
              - not_null
          - name: properties__budget__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__serve__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__travel__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__blog__checkbox
            data_type: boolean
            data_tests:
              - not_null
          - name: properties__goal_review__checkbox
            data_type: boolean
          - name: properties__training__checkbox
            data_type: boolean
          - name: created_time
            data_type: timestamp
            data_tests:
              - not_null
          - name: last_edited_time
            data_type: timestamp
            data_tests:
              - not_null
